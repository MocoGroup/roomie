sonar.projectKey=MocoGroup_roomie
sonar.organization=mocogroup

# Exclui arquivos de teste/spec de regras de segurança
# Evita falsos positivos como S2068 (credentials hardcoded) em testes unitários
sonar.security.exclusions=\
  frontend/src/**/*.spec.ts,\
  backend/src/test/**

# Exclui recursos de teste (data.sql, application-test.properties, schema.sql)
sonar.exclusions=\
  backend/src/test/resources/**
